<!DOCTYPE html>
<html>

<head>
    <title>Draw features example</title>

    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/popper.js/2.11.6/umd/popper.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.2.3/js/bootstrap.min.js"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/ol3/4.6.5/ol.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/ol3/4.6.5/ol.js"></script>

    <script>
        var raster;
        var source;
        var vector;
        var map;
        var typeSelect;
        var draw;
        var modify;          // <-- 新增：编辑交互
        var isEditing = false; // <-- 新增：编辑状态标记
        var features = new ol.Collection();
        var format = new ol.format.WKT();
        var current_shape = "point";
        var currentCrs = 'EPSG:4326';

        var fill = new ol.style.Fill({
            color: 'rgba(210, 122, 167,0.2)'
        });
        var stroke = new ol.style.Stroke({
            color: '#B40404',
            width: 2
        });

        var styles = [
            new ol.style.Style({
                image: new ol.style.Circle({
                    fill: fill,
                    stroke: stroke,
                    radius: 5
                }),
                fill: fill,
                stroke: stroke
            })
        ];

        function addInteraction(shape) {
            draw = new ol.interaction.Draw({
                features: features,
                type: /** @type {ol.geom.GeometryType} */ shape
            });
            // 绘制完成时自动更新 WKT
            draw.on('drawend', function(e) {
                // 等待 feature 被添加到 collection 后再触发 add 事件
                setTimeout(function() {
                    updateWKT();
                }, 0);
            });
            map.addInteraction(draw);
        }

        // 新增：启用/禁用编辑模式
        function toggleEdit() {
            var btn = document.getElementById('editBtn');
            
            if (isEditing) {
                // 关闭编辑
                if (modify) {
                    map.removeInteraction(modify);
                    modify = null;
                }
                isEditing = false;
                btn.textContent = 'Edit';
                btn.classList.remove('btn-warning');
                btn.classList.add('btn-primary');
                
                // 重新启用绘制交互（根据当前类型）
                addInteraction(current_shape);
            } else {
                // 开启编辑
                if (draw) {
                    map.removeInteraction(draw);
                }
                
                modify = new ol.interaction.Modify({
                    features: features,
                    deleteCondition: function(event) {
                        // 按住 Alt 键点击顶点可删除（可选功能）
                        return ol.events.condition.altKeyOnly(event) && 
                               ol.events.condition.click(event);
                    }
                });
                
                // 监听修改事件，实时更新 WKT
                modify.on('modifyend', function(e) {
                    updateWKT();
                });
                
                map.addInteraction(modify);
                isEditing = true;
                btn.textContent = 'Done';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-warning');
            }
        }

        function createVector() {
            vector = new ol.layer.Vector({
                source: new ol.source.Vector({ features: features }),
                style: styles
            });
        }

        function getCoordDepth(type) {
            switch(type) {
                case 'Point': return 0;
                case 'LineString': return 1;
                case 'Polygon': return 2;
                case 'MultiPoint': return 1;
                case 'MultiLineString': return 2;
                case 'MultiPolygon': return 3;
                default: return 0;
            }
        }

        function collectLongitudes(coords, depth) {
            var lons = [];
            if (depth === 0) {
                lons.push(coords[0]);
            } else {
                for (var i = 0; i < coords.length; i++) {
                    lons = lons.concat(collectLongitudes(coords[i], depth - 1));
                }
            }
            return lons;
        }

        function adjustLongitudes(coords, depth, fn) {
            if (depth === 0) {
                coords[0] = fn(coords[0]);
            } else {
                for (var i = 0; i < coords.length; i++) {
                    adjustLongitudes(coords[i], depth - 1, fn);
                }
            }
        }

        function normalizeLon(lon) {
            while (lon > 180) lon -= 360;
            while (lon < -180) lon += 360;
            return lon;
        }

        // 将 features 转为 4326 后写出 WKT，再转回 3857
        // 对跨日期变更线的图形，保持经度连续（允许 >180）；对普通图形归一化到 [-180,180]
        function updateWKT() {
            features.forEach(toEPSG4326);

            var adjustedFeatures = features.getArray().map(function(f) {
                var clone = f.clone();
                var geom = clone.getGeometry();
                var type = geom.getType();
                var coords = geom.getCoordinates();
                var depth = getCoordDepth(type);

                var lons = collectLongitudes(coords, depth);
                if (lons.length > 0) {
                    var minLon = Math.min.apply(null, lons);
                    var maxLon = Math.max.apply(null, lons);

                    if (maxLon - minLon > 180) {
                        // 跨日期变更线：将负经度 +360 保持连续
                        // 如 -170 → 190，这样多边形不会绕远路
                        adjustLongitudes(coords, depth, function(lon) {
                            return lon < 0 ? lon + 360 : lon;
                        });
                    } else {
                        // 普通图形：归一化到 [-180, 180]
                        adjustLongitudes(coords, depth, normalizeLon);
                    }
                    geom.setCoordinates(coords);
                }
                return clone;
            });

            document.getElementById('wktStringTextArea').value =
                format.writeFeatures(adjustedFeatures, { rightHanded: true });
            features.forEach(toEPSG3857);
        }

        function toEPSG4326(element, index, array) {
            element.getGeometry().transform('EPSG:3857', 'EPSG:4326');
        }

        function toEPSG3857(element, index, array) {
            element.getGeometry().transform('EPSG:4326', 'EPSG:3857');
        }

        function selectGeom(shape) {
            current_shape = shape;
            map.removeInteraction(draw);
            
            // 如果正在编辑，先退出编辑模式再切换绘制类型
            if (isEditing) {
                toggleEdit();
            }
            
            addInteraction(shape);
        }

        function init() {
            createVector();
            raster = new ol.layer.Tile({
                source: new ol.source.OSM()
            });
            
            tianditu = new ol.layer.Tile({
                source: new ol.source.XYZ({
                    url:"https://t1.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=17901572a8abca3a2022daa067f9f836",
                })
            });

            tianditu_label = new ol.layer.Tile({
                source: new ol.source.XYZ({
                    url:"https://t3.tianditu.gov.cn/DataServer?T=cva_w&x={x}&y={y}&l={z}&scale=2&tk=17901572a8abca3a2022daa067f9f836",
                })
            });

            features.on("add", function (e) {
                restoreDefaultColors();
                updateWKT();
            });

            map = new ol.Map({
                layers: [tianditu, tianditu_label, vector],
                target: 'map',
                view: new ol.View({
                    center: [-11000000, 4600000],
                    zoom: 4
                })
            });
            
            if (window.location && window.location.hash) {
                loadWKTfromURIFragment(window.location.hash);
            }
            plotWKT();
            selectGeom('Point');
        }

        function restoreDefaultColors() {
            document.getElementById("wktStringTextArea").style.borderColor = "";
            document.getElementById("wktStringTextArea").style.backgroundColor = "";
        };

        function plotWKT() {
            var new_feature;
            var wkt_string = document.getElementById("wktStringTextArea").value;
            
            if (wkt_string == "") {
                document.getElementById("wktStringTextArea").style.borderColor = "red";
                document.getElementById("wktStringTextArea").style.backgroundColor = "#F7E8F3";
                return;
            } else {
                try {
                    new_feature = format.readFeature(wkt_string);
                } catch (err) {
                }
            }

            if (!new_feature) {
                document.getElementById("wktStringTextArea").style.borderColor = "red";
                document.getElementById("wktStringTextArea").style.backgroundColor = "#F7E8F3";
                return;
            } else {
                map.removeLayer(vector);
                features.clear();
                
                // 如果正在编辑，先移除编辑交互
                if (isEditing && modify) {
                    map.removeInteraction(modify);
                }
                
                new_feature.getGeometry().transform('EPSG:4326', 'EPSG:3857');
                features.push(new_feature);
            }
            
            vector = new ol.layer.Vector({
                source: new ol.source.Vector({ features: features }),
                style: styles
            });

            selectGeom(current_shape);
            map.addLayer(vector);
            
            // 如果之前在编辑模式，重新绑定编辑交互到新要素
            if (isEditing) {
                map.removeInteraction(draw); // 移除绘制交互
                modify = new ol.interaction.Modify({
                    features: features
                });
                modify.on('modifyend', function(e) {
                    updateWKT();
                });
                map.addInteraction(modify);
            }
            
            var derived_feature = features.getArray()[0];
            var extent = derived_feature.getGeometry().getExtent();
            var minx = derived_feature.getGeometry().getExtent()[0];
            var miny = derived_feature.getGeometry().getExtent()[1];
            var maxx = derived_feature.getGeometry().getExtent()[2];
            var maxy = derived_feature.getGeometry().getExtent()[3];
            var centerx = (minx + maxx) / 2;
            var centery = (miny + maxy) / 2;
            
            map.setView(new ol.View({
                center: [centerx, centery],
                zoom: 8
            }));
            map.getView().fit(extent, map.getSize());
        }

        function clearMap() {
            map.removeLayer(vector);
            features.clear();
            
            // 清理交互
            if (draw) map.removeInteraction(draw);
            if (modify) map.removeInteraction(modify);
            
            vector = new ol.layer.Vector({
                source: new ol.source.Vector({ features: features }),
                style: styles
            });
            
            isEditing = false;
            document.getElementById('editBtn').textContent = 'Edit';
            document.getElementById('editBtn').classList.remove('btn-warning');
            document.getElementById('editBtn').classList.add('btn-primary');
            
            selectGeom(current_shape);
            map.addLayer(vector);
            document.getElementById("wktStringTextArea").value = "";
            restoreDefaultColors();
        }

        function loadWKTfromURIFragment(fragment) {
            var wkt = window.location.hash.slice(1);
            document.getElementById("wktStringTextArea").value = decodeURI(wkt);
        }

        function transformTo3857() {
            var wkt = document.getElementById('wktStringTextArea').value.trim();
            if (!wkt) { return; }

            try {
                var features = format.readFeatures(wkt, {
                    dataProjection: 'EPSG:4326',
                    featureProjection: 'EPSG:4326'
                });

                features.forEach(function (f) {
                    f.getGeometry().transform('EPSG:4326', 'EPSG:3857');
                });

                var newWKT = format.writeFeatures(features, {
                    dataProjection: 'EPSG:3857',
                    featureProjection: 'EPSG:3857',
                    rightHanded: true
                });
                document.getElementById('wktStringTextArea').value = newWKT;
            } catch (e) {
                alert('转换失败：' + e.message);
            }
        }

        function toggleCrs() {
            var txtArea = document.getElementById('wktStringTextArea');
            var wkt = txtArea.value.trim();
            if (!wkt) { return; }

            try {
                var features = format.readFeatures(wkt, {
                    dataProjection: currentCrs,
                    featureProjection: currentCrs
                });

                var targetCrs = (currentCrs === 'EPSG:4326') ? 'EPSG:3857' : 'EPSG:4326';

                features.forEach(function (f) {
                    f.getGeometry().transform(currentCrs, targetCrs);
                });

                var newWKT = format.writeFeatures(features, {
                    dataProjection: targetCrs,
                    featureProjection: targetCrs,
                    rightHanded: true
                });
                txtArea.value = newWKT;

                currentCrs = targetCrs;
                var btn = document.getElementById('toggleCrsBtn');
                btn.textContent = (currentCrs === 'EPSG:4326')
                                ? 'To EPSG:3857'
                                : 'To EPSG:4326';
            } catch (e) {
                alert('切换失败：' + e.message);
            }
        }
    </script>

        }

</head>
